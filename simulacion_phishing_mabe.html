<title>Simulación Phishing — Capacitación Ciberseguridad</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface-alt: #f8f8f6;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #1a1a18;
    --text-secondary: #5a5a56;
    --text-muted: #9a9a94;
    --accent: #1b7075;
    --accent-light: #e6f2f3;
    --accent-text: #0d4548;
    --success: #2d7a3a;
    --success-light: #eaf4ec;
    --success-border: #a8d5b0;
    --danger: #b83232;
    --danger-light: #fceaea;
    --danger-border: #f0aaaa;
    --warning: #916200;
    --warning-light: #fef7e0;
    --warning-border: #f0d080;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    line-height: 1.6;
  }

  .container {
    width: 100%;
    max-width: 660px;
  }

  /* Header */
  .app-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .app-header .brand {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .app-header h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .app-header p {
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* Progress */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .prog-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .prog-label {
    font-size: 12px;
    color: var(--text-muted);

  }

  /* Mail client */
  .mail-client {

    border-radius: var(--radius-lg);

  .dot-y { background: #FFBD2E; }
  .dot-g { background: #28C840; }
  .titlebar-text {

    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);

  .mail-header {
    padding: 18px 20px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .mail-subject {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .meta-row {
    display: flex;
    gap: 8px;
    font-size: 13px;
    margin-bottom: 5px;
    align-items: flex-start;
  }
  .meta-label {
    color: var(--text-muted);
    min-width: 38px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  /* Sender toggle */
  .sender-toggle {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: var(--text-primary);
    font-weight: 500;
    position: relative;
    border-radius: 4px;
    padding: 1px 4px 1px 2px;
    transition: background 0.15s;
    user-select: none;
  }
  .sender-toggle:hover { background: var(--accent-light); color: var(--accent-text); }
  .chevron {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(180deg); }

  /* Tooltip */
  .sender-tooltip {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 12px 14px;
    z-index: 100;
    min-width: 270px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.10);
  }
  .sender-tooltip.open { display: block; }
  .tooltip-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    flex-shrink: 0;

    color: var(--text-secondary);

  .email-highlight {
    background: var(--warning-light);
    color: var(--warning);
    padding: 1px 3px;
    border-radius: 3px;
    font-weight: 700;

  .mail-body {
    padding: 20px;
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.75;
    min-height: 140px;
  }
  .mail-body p { margin-bottom: 12px; }
  .mail-body p:last-child { margin-bottom: 0; }
  .mail-link { color: #1a5ea8; text-decoration: underline; cursor: default; }

  /* Attachment */
  .mail-attachment {
    margin: 0 20px 4px;
    padding: 10px 14px;
    background: var(--surface-alt);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .att-icon { color: var(--text-secondary); font-size: 18px; flex-shrink: 0; }
  .att-name { color: var(--text-primary); font-weight: 500; }
  .att-size { color: var(--text-muted); margin-left: auto; }

  /* Verdict buttons */
  .verdict-zone {
    padding: 16px 20px;
    border-top: 0.5px solid var(--border);
  }
  .verdict-q {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .verdict-btns { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 10px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;

  .btn:hover { opacity: 0.82; }
  .btn:active { transform: scale(0.98); }
  .btn-trust {
    background: var(--success-light);
    color: var(--success);
    border-color: var(--success-border);
  }
  .btn-distrust {
    background: var(--danger-light);
    color: var(--danger);
    border-color: var(--danger-border);
  }
  .btn-neutral {
    background: var(--surface-alt);
    color: var(--text-primary);
    border-color: var(--border-strong);
    width: 100%;
    margin-top: 12px;
  }

  /* Consequence panel */
  .consequence-panel {
    display: none;
    margin: 0 20px 16px;
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;

  .consequence-panel.wrong {

    border-color: var(--danger-border);
    color: var(--danger);

  .consequence-panel.right {
    background: var(--success-light);
    border-color: var(--success-border);
    color: var(--success);

  .consequence-panel.visible { display: block; }
  .consequence-title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;

  .checklist li {

  }
  .check-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: background 0.15s, border-color 0.15s;
  }
  .checklist li.checked .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-tick {
    display: none;
    width: 10px;
    height: 10px;
    stroke: white;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  .checklist li.checked .check-tick { display: block; }
  .clue-text { font-size: 13px; color: var(--text-secondary); line-height: 1.55; flex: 1; }

  .checklist-score {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }
  .checklist-score span { font-weight: 600; color: var(--accent); }

  .final-screen {
    display: none;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);

  .final-big { font-size: 52px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .final-sub { font-size: 14px; color: var(--text-secondary); margin: 6px 0 20px; }
  .score-breakdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 1.5rem;
  }
  .score-pill {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid;
  }
  .score-pill.detect {
    background: var(--success-light);
    color: var(--success);
    border-color: var(--success-border);
  }
  .score-pill.clues {
    background: var(--accent-light);
    color: var(--accent-text);
    border-color: rgba(27,112,117,0.3);
  }
  .final-msg {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    max-width: 460px;
    margin: 0 auto 1.5rem;
  }
  .btn-restart {
    padding: 10px 28px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border-strong);
    background: var(--surface-alt);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-restart:hover { background: var(--bg); }

  svg.icon {
    display: inline-block;
    vertical-align: middle;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @media (max-width: 480px) {
    body { padding: 1rem 0.75rem 3rem; }
    .mail-body { padding: 14px; }
    .mail-header { padding: 14px; }
    .verdict-zone { padding: 12px 14px; }
    .result-panel { padding: 12px 14px; }
  }
</style>
</head>

    rightConsequence: "Al verificar la dirección real del remitente y notar que era 'dreanmave' en lugar de 'dreanmabe', bloqueaste la transferencia y alertaste al área de IT. Fernando Martínez fue contactado por teléfono y confirmó no haber enviado ningún correo. Se rastreó el intento al grupo atacante y se reforzaron los protocolos de autorización de pagos.",
    clues: [
      { text: 'La dirección del remitente dice <b>dreanmave.com.ar</b> en lugar de <b>dreanmabe.com.ar</b>. Una sola letra cambiada — casi imperceptible sin hacer clic para ver la dirección completa.', spotted: false },
      { text: 'El pedido de <b>confidencialidad</b> ("no lo mencionen en los canales habituales") está diseñado para aislar a la víctima e impedir que consulte con otros antes de actuar.', spotted: false },
      { text: 'La <b>urgencia horaria</b> ("antes de las 12:00") y la excusa de "reuniones toda la mañana" presionan para actuar rápido y bloquean la posibilidad de verificación telefónica.', spotted: false },
      { text: 'Ninguna transferencia de monto significativo a un <b>proveedor nuevo</b> debe procesarse sin verificación por un canal alternativo (llamada telefónica directa, no respuesta al mismo correo).', spotted: false }
    ]
  }
];

let current = 0;
let detectScore = 0;
let totalClues = 0;
let ticked = 0;
let answered = false;
let tooltipOpen = false;

function updateProgress() {
  const pct = (current / emails.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = 'Correo ' + (current + 1) + ' de ' + emails.length;
}

function render() {
  document.getElementById('finalScreen').classList.remove('visible');
  document.getElementById('mailClient').style.display = '';
  answered = false;
  tooltipOpen = false;
  updateProgress();

  const e = emails[current];
  e.clues.forEach(c => { c.spotted = false; });

  let attachHtml = '';
  if (e.attachment) {
    attachHtml = `<div class="mail-attachment">
      <span class="att-icon">📎</span>
      <span class="att-name">${e.attachment.name}</span>
      <span class="att-size">${e.attachment.size}</span>
    </div>`;
  }

  document.getElementById('titlebarText').textContent = 'Bandeja de entrada — Drean/Mabe Argentina';
  document.getElementById('mailContent').innerHTML = `
    <div class="mail-header">
      <div class="mail-subject">${e.subject}</div>
      <div class="meta-row">
        <span class="meta-label">De:</span>
        <span style="position:relative;">
          <span class="sender-toggle" id="senderToggle" onclick="toggleTooltip(event)">
            ${e.senderName}
            <svg class="chevron" id="chevronIcon" viewBox="0 0 16 16" width="14" height="14">
              <polyline points="4 6 8 10 12 6"/>
            </svg>
          </span>
          <div class="sender-tooltip" id="senderTooltip">
            <div class="tooltip-avatar" style="background:${e.avatarBg};color:${e.avatarColor};">${e.avatarInitials}</div>
            <div class="tooltip-name">${e.senderName}</div>
            <div class="tooltip-email">${e.senderEmailHtml}</div>
          </div>
        </span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Para:</span>
        <span style="font-size:13px;color:#5a5a56;">${e.to}</span>
      </div>
      <div class="meta-row">
        <span class="meta-label"></span>
        <span style="font-size:12px;color:#9a9a94;">${e.time}</span>
      </div>
    </div>
    <div class="mail-body">${e.body}</div>
    ${attachHtml}
    <div class="verdict-zone" id="verdictZone">
      <div class="verdict-q">¿Cómo calificás este correo?</div>
      <div class="verdict-btns">
        <button class="btn btn-trust" onclick="answer('trust')">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16"><path d="M8 14s-6-3.5-6-7.5A4 4 0 0 1 8 3a4 4 0 0 1 6 3.5C14 10.5 8 14 8 14z"/></svg>
          Es legítimo
        </button>
        <button class="btn btn-distrust" onclick="answer('distrust')">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="11" r="0.5" fill="currentColor"/></svg>
          Es phishing
        </button>
      </div>
    </div>
    <div class="consequence-panel" id="consequencePanel"></div>
    <div class="result-panel" id="resultPanel"></div>
  `;
}

function toggleTooltip(e) {
  e.stopPropagation();
  tooltipOpen = !tooltipOpen;
  const t = document.getElementById('senderTooltip');
  const c = document.getElementById('chevronIcon');
  if (tooltipOpen) {
    t.classList.add('open');
    c.classList.add('open');
  } else {
    t.classList.remove('open');
    c.classList.remove('open');
  }
}

document.addEventListener('click', function() {
  const t = document.getElementById('senderTooltip');
  const c = document.getElementById('chevronIcon');
  if (t && tooltipOpen) {
    t.classList.remove('open');
    if (c) c.classList.remove('open');
    tooltipOpen = false;
  }
});

function answer(choice) {
  if (answered) return;
  answered = true;

  const e = emails[current];
  const isCorrect = choice === e.correctAnswer;
  if (isCorrect) detectScore++;

  document.getElementById('verdictZone').style.display = 'none';

  const cp = document.getElementById('consequencePanel');
  if (isCorrect) {
    cp.className = 'consequence-panel right visible';
    cp.innerHTML = `<div class="consequence-title">${e.rightConsequenceTitle}</div>${e.rightConsequence}`;
  } else {
    cp.className = 'consequence-panel wrong visible';
    cp.innerHTML = `<div class="consequence-title">${e.wrongConsequenceTitle}</div>${e.wrongConsequence}`;
  }

  const cluesHtml = e.clues.map((c, i) => `
    <li id="clue-${i}" onclick="toggleClue(${i})">
      <div class="check-box">
        <svg class="check-tick" viewBox="0 0 10 10" width="10" height="10">
          <polyline points="1.5 5 4 7.5 8.5 2"/>
        </svg>
      </div>
      <div class="clue-text">${c.text}</div>
    </li>
  `).join('');

  const rp = document.getElementById('resultPanel');
  rp.innerHTML = `
    <div class="result-header">
      <span class="result-icon">${isCorrect ? '✓' : '✗'}</span>
      <span class="result-title ${isCorrect ? 'correct' : 'incorrect'}">
        ${isCorrect ? 'Correcto — era phishing.' : 'Era phishing. ¿Qué señales pasaste por alto?'}
      </span>
    </div>
    <div class="checklist-intro">Marcá las señales de alerta que habías notado <em>antes</em> de responder. Sé honesto — suma puntos a tu puntaje total.</div>
    <ul class="checklist" id="clueList">${cluesHtml}</ul>
    <div class="checklist-score">Señales identificadas: <span id="clueCount">0</span> / ${e.clues.length}</div>
    <button class="btn btn-neutral" onclick="next()">
      ${current < emails.length - 1 ? 'Siguiente correo →' : 'Ver resultado final →'}
    </button>
  `;
  rp.classList.add('visible');
}

function toggleClue(i) {
  const e = emails[current];
  const li = document.getElementById('clue-' + i);
  const wasSpotted = e.clues[i].spotted;
  e.clues[i].spotted = !wasSpotted;
  li.classList.toggle('checked');

  const count = e.clues.filter(c => c.spotted).length;
  document.getElementById('clueCount').textContent = count;
  ticked += e.clues[i].spotted ? 1 : -1;
  if (ticked < 0) ticked = 0;
}

function next() {
  current++;
  if (current >= emails.length) {
    showFinal();
  } else {
    render();
  }
}

function showFinal() {
  document.getElementById('mailClient').style.display = 'none';
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = 'Ejercicio completado';

  const totalPossibleClues = emails.reduce((s, e) => s + e.clues.length, 0);
  const totalPoints = detectScore * 3 + ticked;
  const maxPoints = emails.length * 3 + totalPossibleClues;

  document.getElementById('finalBig').textContent = totalPoints + '/' + maxPoints;
  document.getElementById('detectPill').textContent = detectScore + '/' + emails.length + ' correos detectados';
  document.getElementById('cluesPill').textContent = ticked + '/' + totalPossibleClues + ' señales identificadas';

  const pct = totalPoints / maxPoints;
  let msg = '';
  if (pct === 1) {
    msg = '¡Resultado perfecto! Detectaste todos los correos Y notaste todas las señales de alerta. Tu nivel de conciencia en ciberseguridad es muy alto. Recordá que los atacantes evolucionan constantemente — mantener este hábito de verificación es clave.';
  } else if (pct >= 0.7) {
    msg = 'Buen resultado. Detectaste la mayoría de los ataques, pero algunas señales pasaron desapercibidas. Revisá las claves que no marcaste — son exactamente los puntos que los atacantes más sofisticados van a explotar.';
  } else if (pct >= 0.4) {
    msg = 'Resultado intermedio. Los ataques de nivel medio y el "falso CEO" engañan a muchos profesionales. La regla más importante: ante cualquier pedido inusual de dinero o credenciales, siempre verificar por teléfono antes de actuar.';
  } else {
    msg = 'Hay margen para mejorar — y esta capacitación existe exactamente para eso. Recordá: entre el 80 y el 90% de los ataques informáticos comienzan por un error humano. Revisá las señales de alerta de cada correo y prestá especial atención a la dirección real del remitente.';
  }

  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('finalScreen').classList.add('visible');
}

function restart() {
  current = 0;
  detectScore = 0;
  ticked = 0;
  answered = false;
  emails.forEach(e => e.clues.forEach(c => { c.spotted = false; }));
  document.getElementById('finalScreen').classList.remove('visible');
  document.getElementById('mailClient').style.display = '';
  render();
}

render();
</script>
</body>
</html>
