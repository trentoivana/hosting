// ── MATRIX EFFECT ─────────────────────────────────────────────────────────────
function runMatrix(durationMs, onDone) {
  const overlay = document.getElementById('matrixOverlay');
  const canvas  = document.getElementById('matrixCanvas');
  overlay.classList.add('active');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const cols = Math.floor(canvas.width / 16);
  const drops = Array(cols).fill(1);
  const chars = 'アイウエオカキクケコサシスセソABCDEF0123456789@#$%!?<>[]{}\\|/~^';
  let frame;
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px monospace';
    for (let i = 0; i < drops.length; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = Math.random() > 0.95 ? '#ffffff' : '#00ff41';
      ctx.fillText(ch, i * 16, drops[i] * 16);
      if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    frame = requestAnimationFrame(draw);
  }
  draw();
  setTimeout(() => {
    cancelAnimationFrame(frame);
    overlay.classList.remove('active');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (onDone) onDone();
  }, durationMs);
}

    clues: [
      { text: 'La dirección del remitente es <b>fernando.martinez@mave.com.ar</b> en lugar de <b>mabe.com.ar</b>. Una sola letra cambiada — casi imperceptible sin hacer clic para ver la dirección completa.', spotted: false },
      { text: 'El pedido de <b>confidencialidad</b> ("no lo mencionen en los canales habituales") está diseñado para aislar a la víctima e impedir que consulte con otros antes de actuar.', spotted: false },
      { text: 'La <b>urgencia horaria</b> ("antes de las 12:00") y la excusa de "reuniones toda la mañana" presionan para actuar rápido e imposibilitan la verificación telefónica directa.', spotted: false },
      { text: 'Ninguna transferencia de monto significativo a un <b>proveedor nuevo</b> debe procesarse sin verificación por un canal alternativo (llamada telefónica directa, presencialmente). Nunca verificar respondiendo al mismo correo.', spotted: false }
    ]
  }
];

// ── STATE ──────────────────────────────────────────────────────────────────────
let current = 0;
let detectScore = 0;
let ticked = 0;
let answered = false;
let tooltipOpen = false;
let matrixPending = false;

// ── MATRIX TRIGGER ─────────────────────────────────────────────────────────────
function triggerMatrix() {
  if (answered) return;
  runMatrix(5000, null);
}

// ── PROGRESS ───────────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = (current / emails.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = 'Correo ' + (current + 1) + ' de ' + emails.length;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('finalScreen').classList.remove('visible');
  document.getElementById('mailClient').style.display = '';
  answered = false;
  tooltipOpen = false;
  updateProgress();

  const e = emails[current];
  e.clues.forEach(c => { c.spotted = false; });

  let attachHtml = '';
  if (e.attachment) {
    attachHtml = `<div class="mail-attachment">
      <span class="att-icon">📎</span>
      <span class="att-name" onclick="triggerMatrix()">${e.attachment.name}</span>
      <span class="att-size">${e.attachment.size}</span>
    </div>`;
  }

  document.getElementById('titlebarText').textContent = 'Bandeja de entrada — Mabe Argentina';
  document.getElementById('mailContent').innerHTML = `
    <div class="mail-header">
      <div class="mail-subject">${e.subject}</div>
      <div class="meta-row">
        <span class="meta-label">De:</span>
        <span style="position:relative;">
          <span class="sender-toggle" id="senderToggle" onclick="toggleTooltip(event)">
            ${e.senderName}
            <svg class="chevron" id="chevronIcon" viewBox="0 0 16 16" width="14" height="14">
              <polyline points="4 6 8 10 12 6"/>
            </svg>
          </span>
          <div class="sender-tooltip" id="senderTooltip">
            <div class="tooltip-avatar" style="background:${e.avatarBg};color:${e.avatarColor};">${e.avatarInitials}</div>
            <div class="tooltip-name">${e.senderName}</div>
            <div class="tooltip-email">${e.senderEmailHtml}</div>
          </div>
        </span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Para:</span>
        <span style="font-size:13px;color:#5a5a56;">${e.to}</span>
      </div>
      <div class="meta-row">
        <span class="meta-label"></span>
        <span style="font-size:12px;color:#9a9a94;">${e.time}</span>
      </div>
    </div>
    <div class="mail-body">${e.body}</div>
    ${attachHtml}
    <div class="verdict-zone" id="verdictZone">
      <div class="verdict-q">¿Cómo califica este correo?</div>
      <div class="verdict-btns">
        <button class="btn btn-trust" onclick="answer('trust')">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;" viewBox="0 0 16 16"><path d="M8 14s-6-3.5-6-7.5A4 4 0 0 1 8 3a4 4 0 0 1 6 3.5C14 10.5 8 14 8 14z"/></svg>
          Es legítimo
        </button>
        <button class="btn btn-distrust" onclick="answer('distrust')">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="11" r="0.5" fill="currentColor"/></svg>
          Es phishing
        </button>
      </div>
    </div>
    <div class="consequence-panel" id="consequencePanel"></div>
    <div class="result-panel" id="resultPanel"></div>
  `;
}

function toggleTooltip(e) {
  e.stopPropagation();
  tooltipOpen = !tooltipOpen;
  const t = document.getElementById('senderTooltip');
  const c = document.getElementById('chevronIcon');
  tooltipOpen ? t.classList.add('open') : t.classList.remove('open');
  tooltipOpen ? c.classList.add('open') : c.classList.remove('open');
}

document.addEventListener('click', function() {
  const t = document.getElementById('senderTooltip');
  const c = document.getElementById('chevronIcon');
  if (t && tooltipOpen) {
    t.classList.remove('open');
    if (c) c.classList.remove('open');
    tooltipOpen = false;
  }
});

// ── ANSWER ─────────────────────────────────────────────────────────────────────
function answer(choice) {
  if (answered) return;
  answered = true;

  const e = emails[current];
  const isCorrect = choice === e.correctAnswer;
  if (isCorrect) detectScore++;

  document.getElementById('verdictZone').style.display = 'none';

  const cp = document.getElementById('consequencePanel');
  cp.className = 'consequence-panel ' + (isCorrect ? 'right' : 'wrong') + ' visible';
  cp.innerHTML = `<div class="consequence-title">${isCorrect ? e.rightConsequenceTitle : e.wrongConsequenceTitle}</div>${isCorrect ? e.rightConsequence : e.wrongConsequence}`;

  const cluesHtml = e.clues.map((c, i) => `
    <li id="clue-${i}" onclick="toggleClue(${i})">
      <div class="check-box">
        <svg class="check-tick" viewBox="0 0 10 10" width="10" height="10">
          <polyline points="1.5 5 4 7.5 8.5 2"/>
        </svg>
      </div>
      <div class="clue-text">${c.text}</div>
    </li>
  `).join('');

  const intro = isCorrect
    ? 'Marque las señales de alerta que había notado <em>antes</em> de responder. Sea honesto: cada señal identificada suma puntos a su puntaje total.'
    : 'Era phishing. Pasaste por alto varios detalles... Revisá las señales de alerta a continuación. Marcá si notaste alguna.';

  const rp = document.getElementById('resultPanel');
  rp.innerHTML = `
    <div class="result-header">
      <span class="result-icon">${isCorrect ? '✓' : '✗'}</span>
      <span class="result-title ${isCorrect ? 'correct' : 'incorrect'}">
        ${isCorrect ? 'Correcto — era phishing.' : 'Incorrecto — era phishing.'}
      </span>
    </div>
    <div class="checklist-intro">${intro}</div>
    <ul class="checklist" id="clueList">${cluesHtml}</ul>
    <div class="checklist-score">Señales identificadas: <span id="clueCount">0</span> / ${e.clues.length}</div>
    <button class="btn btn-neutral" onclick="next()">
      ${current < emails.length - 1 ? 'Siguiente correo →' : 'Ver resultado final →'}
    </button>
  `;
  rp.classList.add('visible');

  // Si se equivocó, lanzar matrix antes de mostrar el resultado
  if (!isCorrect) {
    runMatrix(5000, null);
  }
}

function toggleClue(i) {
  const e = emails[current];
  const wasSpotted = e.clues[i].spotted;
  e.clues[i].spotted = !wasSpotted;
  document.getElementById('clue-' + i).classList.toggle('checked');
  const count = e.clues.filter(c => c.spotted).length;
  document.getElementById('clueCount').textContent = count;
  ticked += e.clues[i].spotted ? 1 : -1;
  if (ticked < 0) ticked = 0;
}

function next() {
  current++;
  if (current >= emails.length) showFinal();
  else render();
}

// ── FINAL ──────────────────────────────────────────────────────────────────────
function showFinal() {
  document.getElementById('mailClient').style.display = 'none';
  const fs = document.getElementById('finalScreen');
  fs.classList.add('visible');

  const totalPossibleClues = emails.reduce((s, e) => s + e.clues.length, 0);
  const totalPoints = detectScore * 3 + ticked;
  const maxPoints = emails.length * 3 + totalPossibleClues;

  document.getElementById('finalBig').textContent = totalPoints + '/' + maxPoints;
  document.getElementById('detectPill').textContent = detectScore + '/' + emails.length + ' correos detectados';
  document.getElementById('cluesPill').textContent = ticked + '/' + totalPossibleClues + ' señales identificadas';

  const pct = totalPoints / maxPoints;
  let msg = '';
  if (pct === 1) {
    msg = '¡Resultado perfecto! Detectó todos los correos y notó todas las señales de alerta. Su nivel de conciencia en ciberseguridad es muy alto. Recuerde que los atacantes evolucionan constantemente: mantener el hábito de verificación es clave.';
  } else if (pct >= 0.7) {
    msg = 'Buen resultado. Detectó la mayoría de los ataques, pero algunas señales pasaron desapercibidas. Revise las claves que no marcó: son exactamente los puntos que los atacantes más sofisticados van a explotar.';
  } else if (pct >= 0.4) {
    msg = 'Resultado intermedio. Los ataques de nivel medio y el "falso CEO" engañan a muchos profesionales. La regla más importante: ante cualquier pedido inusual de dinero o credenciales, verifique siempre por teléfono antes de actuar.';
  } else {
    msg = 'Hay margen para mejorar — y esta capacitación existe exactamente para eso. Recuerde: entre el 80 y el 90% de los ataques informáticos comienzan por un error humano. Revise las señales de alerta de cada correo y preste especial atención a la dirección real del remitente.';
  }
  document.getElementById('finalMsg').textContent = msg;
}

function restart() {
  current = 0; detectScore = 0; ticked = 0; answered = false;
  emails.forEach(e => e.clues.forEach(c => { c.spotted = false; }));
  document.getElementById('finalScreen').classList.remove('visible');
  document.getElementById('mailClient').style.display = '';
  render();
}

render();
</script>
</body>
</html>
